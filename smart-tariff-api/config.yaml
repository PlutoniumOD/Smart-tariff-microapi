name: Smart Tariff Micro‑API
version: "0.1.0"
slug: smart_tariff_api
description: "Local micro‑API for Bright/DCC electricity & gas tariffs, consumption, costs. E7 + EV + Intelligent support with DST, MQTT, and REST."
arch:
  - aarch64
  - amd64
startup: services
init: false
boot: auto
homeassistant_api: true
ports:
  8787/tcp: 8787
map:
  - data:rw
options:
  glowmarkt:
    email: ""
    password: ""
  tariff:
    # Modes: e7 | go | flex | uw_ev | ovo_powermove | intelligent
    # (Agile/Tracker later)
    mode: "e7"
    # E7 baseline (GMT window; DST handled automatically)
    e7_offpeak_start_gmt: "00:30"
    e7_offpeak_end_gmt: "07:30"
    timezone: "Europe/London"
    lock_buckets: true   # NEW: keep offpeak/peak rates fixed unless you turn this off
      
    # Windowed EV modes (enter pairs of HH:MM,HH:MM for each off-peak window in GMT)
    # Example for Octopus Go (UK historical default): "00:30","04:30"
    go_windows_gmt: []           # e.g. ["00:30","04:30"]
    uw_ev_windows_gmt: []        # e.g. ["00:00","05:00"] (fill with your supplier's actual windows)
    ovo_windows_gmt: []          # e.g. ["00:00","07:00"]

  initial_values:
    elec_offpeak_rate: "0.0515"
    elec_peak_rate: "0.3852"
    elec_standing_charge: "0.4174"
    
  octopus:
    api_key: ""                  # optional (for Agile/Intelligent later)
    account_id: ""

  intelligent:
    allow_post_schedule: true

  mqtt:
    enabled: true
    host: "core-mosquitto"
    port: 1883
    username: ""
    password: ""
    topic_prefix: "smartenergy"

  homeassistant:
    solar_enabled: true
    # If running as HA add-on: use supervisor proxy (default true)
    use_supervisor: true
    # Only needed if NOT using supervisor:
    base_url: "http://homeassistant.local:8123"
    token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiI4ZGZlMTUzOWUxNzc0NDdkOWUyNjFmMjI5YWEzYzBjYSIsImlhdCI6MTc3NDM3NDc5MSwiZXhwIjoyMDg5NzM0NzkxfQ.NI95WpAB5B0A1PlWyrtMjzldfl80zYVxYSQrdkFWg2k"  # long-lived access token
    solar_entity_id: "sensor.solaredge_ac_power"
    solar_poll_secs: 15
    solar_stale_secs: 60

schema:
  glowmarkt:
    email: str
    password: str

  tariff:
    mode: list(e7|go|flex|uw_ev|ovo_powermove|intelligent)
    e7_offpeak_start_gmt: str
    e7_offpeak_end_gmt: str
    timezone: str
    lock_buckets: bool?
    go_windows_gmt:
      - str?
    uw_ev_windows_gmt:
      - str?
    ovo_windows_gmt:
      - str?

  initial_values:
    elec_offpeak_rate: str
    elec_peak_rate: str
    elec_standing_charge: str
    
  octopus:
    api_key: str?
    account_id: str?

  intelligent:
    allow_post_schedule: bool

  mqtt:
    enabled: bool
    host: str
    port: int
    username: str?
    password: str?
    topic_prefix: str
  
  homeassistant:
    solar_enabled: bool?
    use_supervisor: bool?
    base_url: str? #Only needed if not using Supervisor
    token: str?    #Only needed if not using Supervisor
    solar_entity_id: str?
    solar_poll_secs: int?
    solar_stale_secs: int?
  
